name: Script Smoke Tests

on:
  push:
  pull_request:

jobs:
  macos:
    name: macOS Bash scripts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill frontmatter
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in sorted(Path('.').glob('hackathon-*/SKILL.md')):
              text = path.read_text()
              assert text.startswith('---\n'), f'missing frontmatter: {path}'
              end = text.find('\n---\n', 4)
              assert end != -1, f'unclosed frontmatter: {path}'
              fm = text[4:end]
              assert 'name:' in fm, f'missing name: {path}'
              assert 'description:' in fm, f'missing description: {path}'
              print(f'OK {path}')
          PY

      - name: Check Bash syntax and help
        shell: bash
        run: |
          set -euo pipefail
          for f in scripts/*.sh hackathon-*/scripts/*.sh; do
            echo "$f"
            bash -n "$f"
            "$f" --help >/dev/null
          done

      - name: Test Bash installer in codex mode
        shell: bash
        run: |
          set -euo pipefail
          DEST="$(mktemp -d)/codex-skills"
          ./scripts/install-skills.sh --agent codex --dest "$DEST"
          test -d "$DEST/hackathon-bootstrap"
          test -f "$DEST/hackathon-bootstrap/SKILL.md"
          test -d "$DEST/hackathon-submission-check"

      - name: Test Bash installer in claude mode
        shell: bash
        run: |
          set -euo pipefail
          DEST="$(mktemp -d)/claude-skills"
          ./scripts/install-skills.sh --agent claude --dest "$DEST" --skills hackathon-bootstrap,hackathon-preview
          test -d "$DEST/hackathon-bootstrap"
          test -d "$DEST/hackathon-preview"
          test ! -d "$DEST/hackathon-bugfix"

      - name: Check allowed app stack policy
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'React.js frontend' README.md
          grep -q 'Node.js or Go backend' README.md
          grep -q 'SQLite database' README.md
          grep -q 'Frontend: React.js' hackathon-bootstrap/SKILL.md
          grep -q 'Backend: Node.js or Go' hackathon-bootstrap/SKILL.md
          grep -q 'Database: SQLite' hackathon-bootstrap/SKILL.md
          pattern='[m]ysql|[M]ySQL|[P]ostgres|[M]ongo|[R]edis|[F]irebase|[S]upabase|[N]ext[.]js'
          if find . -path ./.git -prune -o -type f -print0 | xargs -0 grep -InE "$pattern"; then
            echo "Disallowed app-stack references found"
            exit 1
          fi

      - name: Ensure old single-port config was removed
        shell: bash
        run: |
          set -euo pipefail
          pattern='[8]080'
          if find . -path ./.git -prune -o -type f -print0 | xargs -0 grep -InE "$pattern"; then
            echo "Old single-port references found"
            exit 1
          fi

  windows:
    name: Windows PowerShell scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PowerShell syntax and help
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = @(Get-ChildItem -Path . -Recurse -Filter *.ps1)
          if (-not $scripts) {
            throw "No PowerShell scripts found"
          }
          foreach ($script in $scripts) {
            Write-Host $script.FullName
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Host
              throw "PowerShell parse failed for $($script.FullName)"
            }
            & $script.FullName -Help | Out-Null
          }

      - name: Test PowerShell installer in codex mode
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dest = Join-Path $env:RUNNER_TEMP "codex-skills"
          .\scripts\install-skills.ps1 -Agent codex -Dest $dest
          if (-not (Test-Path (Join-Path $dest "hackathon-bootstrap\SKILL.md"))) {
            throw "Codex install did not create hackathon-bootstrap"
          }
          if (-not (Test-Path (Join-Path $dest "hackathon-submission-check\SKILL.md"))) {
            throw "Codex install did not create hackathon-submission-check"
          }

      - name: Test PowerShell installer in claude mode
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dest = Join-Path $env:RUNNER_TEMP "claude-skills"
          .\scripts\install-skills.ps1 -Agent claude -Dest $dest -Skills "hackathon-bootstrap,hackathon-preview"
          if (-not (Test-Path (Join-Path $dest "hackathon-bootstrap\SKILL.md"))) {
            throw "Claude install did not create hackathon-bootstrap"
          }
          if (-not (Test-Path (Join-Path $dest "hackathon-preview\SKILL.md"))) {
            throw "Claude install did not create hackathon-preview"
          }
          if (Test-Path (Join-Path $dest "hackathon-bugfix")) {
            throw "Claude install copied an unrequested skill"
          }

      - name: Ensure matching Bash scripts exist
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($ps in Get-ChildItem -Path . -Recurse -Filter *.ps1) {
            $sh = [System.IO.Path]::ChangeExtension($ps.FullName, ".sh")
            if (-not (Test-Path $sh)) {
              throw "Missing Bash counterpart for $($ps.FullName)"
            }
          }
